name: Publish to Maven

on:
  release:
    types: [ published ]

jobs:
  publish:
    if: github.repository_owner == 'viamrobotics'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish package
        run: ./gradlew publish
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_portalUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_portalPassword: ${{ secrets.OSSRH_PASSWORD }}

      - name: Publish plugin
        run: ./gradlew publishPlugins
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

      - name: Transfer from Staging to Central
        run: |
          BEARER=$(printf "ORG_GRADLE_PROJECT_portalUsername:ORG_GRADLE_PROJECT_portalPassword" | base64)
          curl --request POST --include --header "Authorization: Bearer $BEARER" https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/com.viam
